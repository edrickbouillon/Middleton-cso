<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive 3D Tour</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="script.js"></script>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</head>

<body>

<div class="topBar">
    <div class="logo">COMPANY BRAND</div>
</div>

<div class="viewerContainer">

<model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    auto-rotate
    exposure="1"
    shadow-intensity="1"
>

<button class="hotspot" slot="hotspot-1" data-id="1"
data-position="0m 1.2m 0.5m"
data-normal="0m 1m 0m"></button>

<button class="hotspot" slot="hotspot-2" data-id="2"
data-position="1m 1m 0.3m"
data-normal="0m 1m 0m"></button>

<button class="hotspot" slot="hotspot-3" data-id="3"
data-position="-0.8m 1.1m -0.2m"
data-normal="0m 1m 0m"></button>

</model-viewer>

<div id="hotspotInfo"></div>

</div>

<div class="menu">

<button class="menuItem" data-id="1">Engineer</button>
<button class="menuItem" data-id="2">Equipment</button>
<button class="menuItem" data-id="3">System</button>

<button id="specialEffect">Special Effect</button>

</div>

</body>
</html>
